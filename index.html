<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ari Portfolio</title>  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    html { scroll-behavior: smooth; }

    body {
      background: radial-gradient(circle at top, #0b0f19, #020617);
      color: #e5e7eb;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 100%; height: 100%;
      background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -2;
    }

    /* BACKGROUND 3D */
    .bg-3d {
      position: fixed;
      top: 0; left: 0;
      width: 120%; height: 120%;
      background: radial-gradient(circle, rgba(56,189,248,0.2), rgba(139,92,246,0.15), transparent);
      filter: blur(60px);
      pointer-events: none;
      transition: transform 0.1s ease;
      z-index: -1;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 1000;
    }

    .nav-container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      padding: 15px 30px;
      border-radius: 20px;
      margin-top: 10px;
    }

    nav a {
      color: #e5e7eb;
      margin-left: 20px;
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a:hover { color: #38bdf8; }

    /* HERO LAYOUT */
    header {
      height: 100vh;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      align-items: center;
      max-width: 1100px;
      margin: auto;
      padding: 0 20px;
      gap: 40px;
    }

    /* NAMA BESAR */
    .name h1 {
      font-size: 3rem;
      line-height: 1.2;
    }

    .name span:nth-child(1) { color: #ffffff; }
    .name span:nth-child(2) { color: #38bdf8; }
    .name span:nth-child(3) { color: #8b5cf6; }

    /* TYPING TEXT */
    .typing {
      margin-top: 15px;
      color: #9ca3af;
    }

    /* DESKRIPSI */
    .desc {
      margin-top: 15px;
      color: #9ca3af;
      max-width: 500px;
      font-size: 0.9rem;
    }

    /* BUTTON */
    .btn-group {
      margin-top: 20px;
      display: flex;
      gap: 15px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 999px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn-primary {
      background: #38bdf8;
      color: black;
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
    }

    .btn:hover { transform: scale(1.05); }

    /* CARD KANAN */
    .code-box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      font-family: monospace;
      font-size: 0.8rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    section {
      padding: 60px 20px;
      max-width: 1100px;
      margin: auto;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
    }
  </style></head>
<body><div class="bg-3d"></div><nav>
  <div class="nav-container">
    <div>Ari</div>
    <div>
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </div>
</nav><!-- HERO --><header>  <!-- KIRI -->  <div class="name">
    <h1>
      <span>Bagas</span><br>
      <span>Putra</span><br>
      <span>Ari Arfindo</span>
    </h1><!-- TYPING -->
<div class="typing" id="typing"></div>

<!-- DESKRIPSI (EDIT SENDIRI) -->
<div class="desc">
  TULIS DESKRIPSI KAMU DI SINI
</div>

<!-- BUTTON -->
<div class="btn-group">
  <a href="#contact" class="btn btn-primary">Contact Me</a>
  <a href="#" class="btn btn-secondary">LinkedIn</a>
</div>

  </div>  <!-- KANAN -->  <div class="code-box">
    role = "Your Role" <br>
    location = "Your City" <br>
    experience = "X Years" <br>
    skills = ["Skill1", "Skill2"]
  </div></header><section id="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section><footer>
  <p>© 2026 Ari</p>
</footer><script>
  // TYPING EFFECT (CYBERSECURITY LEARNER)
  const text = "Cybersecurity Learner";
  let i = 0;

  function type() {
    if (i < text.length) {
      document.getElementById("typing").textContent += text.charAt(i);
      i++;
      setTimeout(type, 80);
    }
  }

  type();

  // BACKGROUND GERAK
  const bg = document.querySelector('.bg-3d');
  document.addEventListener('mousemove', (e) => {
    let x = (e.clientX / window.innerWidth - 0.5) * 30;
    let y = (e.clientY / window.innerHeight - 0.5) * 30;
    bg.style.transform = `translate(${-x}px, ${-y}px)`;
  });
</script></body>
</html>
